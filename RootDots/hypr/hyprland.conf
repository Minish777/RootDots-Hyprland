# --- Variables ---
$mod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$browser = firefox

# --- Monitor ---
monitor=,preferred,auto,1

# --- Autostart ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dunst
exec-once = waybar
exec-once = swww-daemon

# Запуск менеджера буфера обмена (cliphist)
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# --- Input ---
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# --- General ---
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(3a5f3cff) rgba(6b8f71ff) 45deg
    col.inactive_border = rgba(16201aff)
    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 12
    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        noise = 0.02
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(101413ee)
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = fade, 1, 5, default
    animation = border, 1, 6, default
    animation = workspaces, 1, 5, default
}

# --- Binds ---

# Приложения
bind = $mod, RETURN, exec, $terminal
bind = $mod, E, exec, $fileManager
bind = $mod, W, exec, $browser
bind = $mod, R, exec, $menu
# Исправленный буфер обмена
bind = $mod, V, exec, sh -c "cliphist list | fuzzel --dmenu | cliphist decode | wl-copy"
# Новое меню выхода

bind = $mod, M, exec, sh -c "/home/rootly/.config/hypr/scripts/powermenu.sh"

# Управление окнами
bind = $mod, Q, killactive
bind = $mod, SPACE, togglefloating
bind = $mod, D, fullscreen, 1
bind = $mod, F, fullscreen, 0
bind = $mod, S, togglesplit

# Навигация
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Скриншот
bind = , Print, exec, hyprshot -m region --clipboard-only

# Системные (Reload)
bind = $mod SHIFT, R, exec, sh -c "hyprctl reload; pkill waybar; waybar & pkill dunst; dunst & pkill wl-paste; wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store & notify-send 'System' 'Config Reloaded'"
bind = $mod CTRL, Q, exit

# Воркспейсы
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Мышь
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
